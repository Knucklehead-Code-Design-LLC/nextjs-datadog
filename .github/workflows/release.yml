name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install trusted-publishing npm client
        run: npm install --global npm@12.0.1

      - name: Install dependencies
        run: npm ci

      - name: Verify source and package
        run: npm run verify

      - name: Open version pull request or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          publish: npm run release
          title: 'chore: release nextjs-datadog'
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize published release
        if: steps.changesets.outputs.published == 'true'
        run: echo "Published ${PUBLISHED_PACKAGES}"
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
