name: Bug report
description: Report reproducible incorrect behavior in nextjs-datadog
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include credentials, personal information, or production telemetry. Report security vulnerabilities privately as described in SECURITY.md.
  - type: textarea
    id: outcome
    attributes:
      label: Observed behavior
      description: What happened, and what user or system impact did it have?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What contract or documented behavior did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link a minimal repository or provide complete synthetic reproduction steps.
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: nextjs-datadog version
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: runtime-versions
    attributes:
      label: Runtime and framework versions
      description: Include Node.js, Next.js, and React versions.
    validations:
      required: true
  - type: input
    id: telemetry-versions
    attributes:
      label: Telemetry dependency versions
      description: Include relevant Datadog and OpenTelemetry package versions.
    validations:
      required: true
  - type: input
    id: deployment
    attributes:
      label: Deployment platform and runtime
      placeholder: AWS Amplify Hosting, Node.js runtime
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized diagnostics
      description: Add sanitized logs, traces, or screenshots that help reproduce the issue.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find this problem.
          required: true
        - label: This report contains no secrets, personal information, or production telemetry.
          required: true
        - label: This is not a privately reportable security vulnerability.
          required: true
